createAdvertisement:
  handler: app/advertisement/src/handler.create
  events:
    - httpApi:
        path: /advertisements
        method: post
        authorizer:
          name: jwtAuthorizer

listAdvertisements:
  handler: app/advertisement/src/handler.list
  events:
    - httpApi:
        path: /advertisements
        method: get
        authorizer:
          name: jwtAuthorizer

deleteAdvertisement:
  handler: app/advertisement/src/handler.deleteById
  events:
    - httpApi:
        path: /advertisements/{id}
        method: delete
        authorizer:
          name: jwtAuthorizer